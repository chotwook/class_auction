<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Auction Dashboard</title>
    <!-- 1. External Libraries -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@300;400;500;700&family=Google+Sans+Flex:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js"></script>

    <!-- 2. CSS Design System -->
    <style>
        :root {
            --primary: #0b57d0;
            --on-primary: #fff;
            --surface: #fff;
            --surface-container: #f0f4f9;
            --outline: #747775;
            --outline-variant: #c4c7c5;
            --success: #146c2e;
            --error: #b3261e;
            --warning: #f9ab00;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --primary: #a8c7fa;
                --on-primary: #062e6f;
                --surface: #101218;
                --surface-container: #282a2c;
            }
        }
        body {
            font-family: 'Google Sans', 'Roboto', sans-serif;
            background: var(--surface-container);
            color: var(--on-surface-default);
        }
        /* Custom Keypad styles */
        .pin-btn {
            transition: all 0.15s ease-out;
        }
        .pin-btn:active {
            transform: scale(0.9);
            background-color: var(--outline-variant);
        }
    </style>
    <script>
      window['CALLER_ID'] = 'spark';
    </script>
</head>
<body class="spark-widget-shell">

<script>
const { state } = WH.createApp({
  title: "Classroom Auction Dashboard",
  params: {
    roomNumber: { type: "text", value: "617521", label: "Room Number" },
    currency: { type: "text", value: "KAV", label: "Currency Unit" },
    duration: { type: "number", value: 30, min: 5, max: 120, label: "Default Timer (s)" },
    teacherPIN: { type: "text", value: "1234", label: "Teacher PIN Code" }
  },
  internal_state: {
    authenticated: false,
    timeLeft: 30,
    play: false,
    isFinished: false,
    currentBid: 1500,
    bidderName: "Team A"
  },
  sizing: { viz: { height: 420 } },
  editorial: {
    hud: [
      { label: "Status", value: "Locked" },
      { label: "Role", value: "Student Mode" }
    ]
  }
});

WH.initD3('viz', ({ el, width, height, state, ui }) => {
  if (width < 50 || height < 50) return;

  // --- AUDIO SYNTHESIS ---
  let audioCtx = null;
  const initAudio = () => {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  };

  const playClick = (isTock) => {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const freq = isTock ? 880 : 440;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.05);
  };

  const playBuzzer = () => {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(120, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 1);
    gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.2);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 1.2);
  };

  const playGavelSlam = () => {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const noise = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(90, audioCtx.currentTime);
    noise.type = 'sawtooth';
    noise.frequency.setValueAtTime(45, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.6, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
    osc.connect(gain);
    noise.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    noise.start();
    osc.stop(audioCtx.currentTime + 0.45);
    noise.stop(audioCtx.currentTime + 0.45);
  };

  // --- HTML DOM CREATION WITH TAILWIND ---
  const container = d3.select(el)
    .append('div')
    .attr('class', 'w-full h-full flex flex-col relative select-none rounded-2xl overflow-hidden bg-slate-50 dark:bg-zinc-900 shadow-inner p-4');

  // Upper Control & Status Bar
  const statusBar = container.append('div')
    .attr('class', 'w-full flex items-center justify-between bg-white dark:bg-zinc-800 rounded-xl p-3 shadow-sm mb-4 border border-slate-100 dark:border-zinc-700');

  // Secret Multi-Tap Detector on the Room Info
  let clickCount = 0;
  let clickTimeout;

  const roomDisplay = statusBar.append('div')
    .attr('class', 'flex items-center gap-2 cursor-pointer transition hover:bg-slate-100 dark:hover:bg-zinc-700/50 px-2 py-1 rounded-lg')
    .on('pointerdown', () => {
      initAudio();
      clickCount++;
      clearTimeout(clickTimeout);
      if (clickCount >= 3) {
        clickCount = 0;
        if (!state.authenticated) {
          openPinModal();
        }
      } else {
        clickTimeout = setTimeout(() => { clickCount = 0; }, 400);
      }
    });
  
  roomDisplay.append('span')
    .attr('class', 'material-icons text-blue-600')
    .text('school');
  
  const roomText = roomDisplay.append('span')
    .attr('class', 'font-bold text-sm tracking-wide text-slate-700 dark:text-slate-200');

  // Interactive Teacher Authentication Button (Hidden for students, only visible as "Lock" for teachers)
  const authContainer = statusBar.append('div')
    .attr('class', 'flex items-center gap-2');

  const authBadge = authContainer.append('span')
    .attr('class', 'text-xs px-2.5 py-1 rounded-full font-semibold transition-all')
    .text('Student Mode');

  // Lock button: only displays when authenticated to let the teacher lock back the board easily
  const lockBtn = authContainer.append('button')
    .attr('class', 'flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-semibold bg-rose-50 dark:bg-rose-900/20 text-rose-700 dark:text-rose-400 hover:bg-rose-100 transition shadow-sm hidden')
    .on('pointerdown', () => {
      initAudio();
      state.authenticated = false; // Lock back to student mode
    });

  const lockBtnIcon = lockBtn.append('span')
    .attr('class', 'material-icons text-sm')
    .text('lock');

  const lockBtnText = lockBtn.append('span')
    .text('Lock Board');

  const board = container.append('div')
    .attr('class', 'flex-1 w-full grid grid-cols-1 md:grid-cols-2 gap-4 items-center justify-center');

  // Circular Timer Display Panel
  const timerPanel = board.append('div')
    .attr('class', 'w-full h-full flex flex-col items-center justify-center relative');

  // SVG Progress Arc for visual countdown
  const arcSvg = timerPanel.append('svg')
    .attr('class', 'absolute w-48 h-48')
    .attr('viewBox', '0 0 100 100');

  const progressBg = arcSvg.append('circle')
    .attr('cx', 50)
    .attr('cy', 50)
    .attr('r', 45)
    .attr('fill', 'none')
    .attr('stroke', '#e2e8f0')
    .attr('stroke-width', 4);

  const progressFilled = arcSvg.append('circle')
    .attr('cx', 50)
    .attr('cy', 50)
    .attr('r', 45)
    .attr('fill', 'none')
    .attr('stroke', '#3b82f6')
    .attr('stroke-width', 4)
    .attr('stroke-dasharray', 283)
    .attr('stroke-dashoffset', 0)
    .attr('transform', 'rotate(-90, 50, 50)');

  const timeValue = timerPanel.append('div')
    .attr('class', 'z-10 font-bold text-6xl tracking-tighter text-slate-800 dark:text-white flex flex-col items-center');
  
  const secondsDisplay = timeValue.append('span')
    .attr('class', 'leading-none')
    .text('00');
  
  const timerLabel = timeValue.append('span')
    .attr('class', 'text-[10px] uppercase tracking-widest text-slate-400 mt-1')
    .text('SECONDS LEFT');

  // Live Bid Panel
  const bidPanel = board.append('div')
    .attr('class', 'w-full h-full bg-white dark:bg-zinc-800 rounded-2xl p-6 flex flex-col justify-between shadow-sm border border-slate-100 dark:border-zinc-700 min-h-[160px]');

  const bidHeader = bidPanel.append('div');
  bidHeader.append('div')
    .attr('class', 'text-xs text-slate-400 font-semibold tracking-wider uppercase mb-1')
    .text('Current Leading Bid');

  const bidAmount = bidHeader.append('div')
    .attr('class', 'text-4xl font-extrabold text-emerald-600 dark:text-emerald-400 tracking-tight')
    .text('1,500 KAV');

  const bidderDisplay = bidPanel.append('div')
    .attr('class', 'flex items-center gap-2 mt-2 bg-slate-50 dark:bg-zinc-700/50 p-2.5 rounded-xl');

  bidderDisplay.append('span')
    .attr('class', 'material-icons text-emerald-500 text-lg')
    .text('stars');

  const bidderNameText = bidderDisplay.append('span')
    .attr('class', 'text-sm font-bold text-slate-700 dark:text-slate-200');

  // Live Auction Status Overlay (Big Gavel Slam)
  const statusOverlay = container.append('div')
    .attr('class', 'absolute inset-0 z-20 pointer-events-none flex flex-col items-center justify-center bg-emerald-500/10 backdrop-blur-[2px] opacity-0 transition-all duration-300');

  statusOverlay.append('span')
    .attr('class', 'material-icons text-7xl text-emerald-600 dark:text-emerald-400 animate-bounce')
    .text('gavel');

  const statusText = statusOverlay.append('div')
    .attr('class', 'text-5xl font-black tracking-widest text-emerald-600 dark:text-emerald-400 drop-shadow-md')
    .text('SOLD!');

  const teacherPanel = container.append('div')
    .attr('class', 'w-full mt-4 flex items-center justify-center gap-3 bg-slate-100 dark:bg-zinc-800 p-3 rounded-xl border border-dashed border-blue-200 dark:border-zinc-700 h-0 overflow-hidden opacity-0 transition-all duration-300');

  const playBtn = teacherPanel.append('button')
    .attr('class', 'flex-1 h-11 rounded-lg font-bold text-sm text-white bg-blue-600 hover:bg-blue-700 flex items-center justify-center gap-2 shadow-sm transition active:scale-95')
    .on('pointerdown', () => {
      initAudio();
      state.play = !state.play;
    });

  const playIcon = playBtn.append('span')
    .attr('class', 'material-icons text-lg')
    .text('play_arrow');

  const playTextStr = playBtn.append('span')
    .text('Start Timer');

  const addBidBtn = teacherPanel.append('button')
    .attr('class', 'px-4 h-11 rounded-lg font-bold text-sm bg-emerald-50 text-emerald-700 border border-emerald-200 flex items-center gap-1 hover:bg-emerald-100 transition active:scale-95')
    .on('pointerdown', () => {
      initAudio();
      state.currentBid += 100;
      playClick(true);
    });
  
  addBidBtn.append('span').attr('class', 'material-icons text-sm').text('add');
  addBidBtn.append('span').text('+100');

  const resetBtn = teacherPanel.append('button')
    .attr('class', 'px-4 h-11 rounded-lg font-bold text-sm bg-rose-50 text-rose-700 border border-rose-200 flex items-center gap-1 hover:bg-rose-100 transition active:scale-95')
    .on('pointerdown', () => {
      initAudio();
      state.play = false;
      state.timeLeft = state.duration;
      state.isFinished = false;
      state.currentBid = 1500;
      playClick(false);
    });

  resetBtn.append('span').attr('class', 'material-icons text-sm').text('replay');
  resetBtn.append('span').text('Reset');

  // --- KEYPAD PIN MODAL ---
  const modalMask = container.append('div')
    .attr('class', 'absolute inset-0 z-40 bg-slate-900/40 backdrop-blur-md flex items-center justify-center opacity-0 pointer-events-none transition-all duration-300');

  const pinModal = modalMask.append('div')
    .attr('class', 'w-72 bg-white dark:bg-zinc-800 rounded-2xl p-5 shadow-2xl flex flex-col items-center border border-slate-100 dark:border-zinc-700');

  pinModal.append('div')
    .attr('class', 'text-sm font-bold text-slate-700 dark:text-slate-200 mb-1')
    .text('🔒 Teacher Pin Required');

  pinModal.append('div')
    .attr('class', 'text-[11px] text-slate-400 mb-4 text-center')
    .text('Enter PIN to access teacher controls.');

  const pinDotsContainer = pinModal.append('div')
    .attr('class', 'flex gap-3 mb-5');

  const dotElements = Array.from({length: 4}).map(() => 
    pinDotsContainer.append('div')
      .attr('class', 'w-3.5 h-3.5 rounded-full border-2 border-slate-300 dark:border-zinc-600 transition-all')
  );

  const keypadGrid = pinModal.append('div')
    .attr('class', 'grid grid-cols-3 gap-2.5 w-full mb-4');

  let enteredPin = "";

  const updatePinDots = () => {
    dotElements.forEach((dot, index) => {
      if (index < enteredPin.length) {
        dot.classed('bg-blue-600 border-blue-600', true);
      } else {
        dot.classed('bg-blue-600 border-blue-600', false);
      }
    });
  };

  const handleKeyPress = (num) => {
    playClick(false);
    if (enteredPin.length < 4) {
      enteredPin += num;
      updatePinDots();
    }
    if (enteredPin.length === 4) {
      setTimeout(() => {
        if (enteredPin === state.teacherPIN) {
          state.authenticated = true;
          closePinModal();
        } else {
          // Failure Shake effect
          anime({
            targets: pinModal.node(),
            translateX: [-10, 10, -5, 5, 0],
            duration: 350,
            easing: 'easeInOutQuad'
          });
          playBuzzer();
          enteredPin = "";
          updatePinDots();
        }
      }, 150);
    }
  };

  // Generate numbers 1-9
  for (let i = 1; i <= 9; i++) {
    keypadGrid.append('button')
      .attr('class', 'pin-btn h-11 rounded-lg bg-slate-50 dark:bg-zinc-700/60 font-bold text-lg text-slate-700 dark:text-slate-200')
      .text(i)
      .on('pointerdown', () => handleKeyPress(i.toString()));
  }

  // Clear button
  keypadGrid.append('button')
    .attr('class', 'pin-btn h-11 rounded-lg bg-rose-50 dark:bg-zinc-700/60 font-bold text-rose-600 text-sm')
    .text('C')
    .on('pointerdown', () => {
      initAudio();
      enteredPin = "";
      updatePinDots();
    });

  // Zero
  keypadGrid.append('button')
    .attr('class', 'pin-btn h-11 rounded-lg bg-slate-50 dark:bg-zinc-700/60 font-bold text-lg text-slate-700 dark:text-slate-200')
    .text('0')
    .on('pointerdown', () => handleKeyPress('0'));

  // Close (Cancel)
  keypadGrid.append('button')
    .attr('class', 'pin-btn h-11 rounded-lg bg-slate-100 dark:bg-zinc-700 font-bold text-slate-500 text-xs')
    .text('Cancel')
    .on('pointerdown', () => {
      initAudio();
      closePinModal();
    });

  const openPinModal = () => {
    enteredPin = "";
    updatePinDots();
    modalMask.classed('opacity-100 pointer-events-auto', true);
  };

  const closePinModal = () => {
    modalMask.classed('opacity-100 pointer-events-auto', false);
  };

  // Keyboard shortcut fallback: Ctrl + Shift + K triggers PIN pad
  d3.select(window).on('keydown', (event) => {
    if (event.ctrlKey && event.shiftKey && event.key.toLowerCase() === 'k') {
      event.preventDefault();
      if (!state.authenticated) {
        initAudio();
        openPinModal();
      }
    }
  });

  // --- STATE SYSTEM SYNCHRONIZATION ---
  const updateAll = () => {
    // Synchronize displays
    roomText.text(`Room #${state.roomNumber}`);
    bidderNameText.text(`Team Leader: ${state.bidderName}`);
    bidAmount.text(`${state.currentBid.toLocaleString()} ${state.currency}`);

    // Progress circle dynamic calculations
    const progressLimit = state.duration || 30;
    const offset = Math.max(0, Math.min(283, (state.timeLeft / progressLimit) * 283));
    progressFilled.style('stroke-dashoffset', 283 - offset);

    // Authentication Guard View Transitions
    if (state.authenticated) {
      authBadge
        .text('Teacher Authorized')
        .attr('class', 'text-xs px-2.5 py-1 rounded-full font-semibold bg-emerald-50 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-300');
      
      lockBtn.classed('hidden', false);

      // Expand Teacher Control Deck
      teacherPanel
        .style('height', '56px')
        .style('opacity', '1')
        .style('margin-top', '16px');
    } else {
      authBadge
        .text('Student Mode (View Only)')
        .attr('class', 'text-xs px-2.5 py-1 rounded-full font-semibold bg-slate-100 text-slate-600 dark:bg-zinc-800 dark:text-zinc-400');
      
      lockBtn.classed('hidden', true);

      // Hide Teacher Control Deck
      teacherPanel
        .style('height', '0px')
        .style('opacity', '0')
        .style('margin-top', '0px');
    }

    // Timer display text update
    secondsDisplay.text(state.timeLeft < 10 ? `0${state.timeLeft}` : state.timeLeft);
    
    if (state.isFinished) {
      statusOverlay.classed('opacity-100', true);
      secondsDisplay.style('color', WH.getColor('--error'));
    } else {
      statusOverlay.classed('opacity-0', true);
      secondsDisplay.style('color', 'inherit');
    }

    // Dynamic timer pulse during active run
    if (state.play && state.timeLeft <= 5 && state.timeLeft > 0) {
      anime({
        targets: secondsDisplay.node(),
        scale: [1, 1.25, 1],
        duration: 400,
        easing: 'easeInOutQuad'
      });
    }

    // WH Widget HUD Synchronization
    ui.setEditorial({
      hud: [
        { label: "Status", value: state.play ? "RUNNING" : state.isFinished ? "SOLD" : "AWAITING" },
        { label: "Role", value: state.authenticated ? "Teacher" : "Student" },
        { label: "Bids", value: `${state.currentBid.toLocaleString()} ${state.currency}` }
      ]
    });
  };

  let timerInterval = null;

  state._subscribe('authenticated', updateAll);
  state._subscribe('currency', updateAll);
  state._subscribe('timeLeft', updateAll);
  state._subscribe('isFinished', updateAll);
  state._subscribe('currentBid', updateAll);
  state._subscribe('duration', (v) => { if (!state.play) state.timeLeft = v; });

  state._subscribe('play', (isPlaying) => {
    initAudio();
    if (isPlaying) {
      state.isFinished = false;
      if (state.timeLeft <= 0) state.timeLeft = state.duration;

      playTextStr.text('Pause Timer');
      playIcon.text('pause');
      
      timerInterval = setInterval(() => {
        if (state.timeLeft > 0) {
          state.timeLeft--;
          playClick(state.timeLeft % 2 === 0);
        } else {
          state.play = false;
          state.isFinished = true;
          playGavelSlam();
          clearInterval(timerInterval);
        }
      }, 1000);
    } else {
      playTextStr.text('Resume Timer');
      playIcon.text('play_arrow');
      if (timerInterval) clearInterval(timerInterval);
    }
    updateAll();
  });

  // Set default initial timer and refresh view
  state.timeLeft = state.duration;
  updateAll();

  return ({ width, height, state }) => {
    // Optional container size redesign loop
  };
});
</script>

</body>
</html>
